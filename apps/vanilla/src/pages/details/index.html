<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="./index.css" />
    <title>Anime App</title>
  </head>
  <body class="default-layout">
    <main class="main">
      <h1 class="main-heading">Anime detailed card</h1>
      <article class="anime-details">
        <div class="anime-details__wrapper">
          <div class="anime-details__block trailer">
            <h2>AAA</h2>
          </div>
        </div>
        <div class="anime-details__wrapper">
          <div class="anime-details__block picture"></div>
          <div class="anime-details__block anime-title"></div>
          <div class="anime-details__block aired-info"></div>
          <div class="anime-details__block anime-type"></div>
          <div class="anime-details__block genres"></div>
        </div>
        <div class="anime-details__wrapper">
          <div class="anime-details__block synapsis"></div>
        </div>
        <div class="anime-details__wrapper">
          <div class="anime-details__block status"></div>
          <div class="anime-details__block studios"></div>
        </div>
      </article>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
